<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cẩm nang y tế - EduHealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-primary: #3b82f6;
            --blue-deep: #2563eb;
            --pink-primary: #f472b6;
            --pink-deep: #ec489a;
            --grad-blue-pink: linear-gradient(135deg, var(--blue-primary), var(--pink-primary));
            --grad-pink-blue: linear-gradient(135deg, var(--pink-deep), var(--blue-primary));
            --bg-body: #ffffff;
            --bg-surface: #fef9ff;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-dim: #64748b;
            --border-light: #ffe4f0;
            --border-soft: #f1f5f9;
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --hover-glow: rgba(59, 130, 246, 0.12);
            --nav-bg: rgba(255, 255, 255, 0.92);
            --tag-bg: #fce7f3;
            --input-bg: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body.dark {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-dim: #94a3b8;
            --border-light: #334155;
            --border-soft: #2d3a4e;
            --nav-bg: rgba(15, 23, 42, 0.94);
            --tag-bg: #2d3a4e;
            --input-bg: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--border-soft); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--pink-primary); border-radius: 10px; }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            height: 74px;
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border-light);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-mark {
            width: 42px;
            height: 42px;
            background: var(--grad-blue-pink);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .logo-type {
            font-family: 'Fraunces', serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--text-dark) 0%, var(--blue-primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu { display: flex; align-items: center; gap: 32px; }
        .nav-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-mid);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link i { color: var(--pink-primary); }
        .nav-link:hover { color: var(--blue-primary); }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-mid);
            font-family: 'DM Sans', sans-serif;
        }
        .theme-toggle:hover { border-color: var(--blue-primary); color: var(--blue-primary); }

        .menu-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            color: var(--pink-primary);
            cursor: pointer;
            align-items: center;
            gap: 8px;
        }
        .menu-toggle:hover { background: var(--grad-pink-blue); color: white; border-color: transparent; }

        .nav-right { display: flex; align-items: center; gap: 16px; }

        .mobile-menu-panel {
            position: fixed;
            top: 74px;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            z-index: 99;
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            pointer-events: none;
        }
        .mobile-menu-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .mobile-menu-panel .nav-links-mobile {
            display: flex;
            flex-direction: column;
            padding: 24px 6%;
            gap: 20px;
        }
        .mobile-menu-panel .nav-link-mobile {
            padding: 12px 0;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border-light);
        }
        .mobile-menu-panel .nav-link-mobile i { width: 28px; color: var(--blue-primary); font-size: 18px; }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }

        .handbook-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .handbook-title {
            font-family: 'Fraunces', serif;
            font-size: 42px;
            font-weight: 500;
            background: linear-gradient(90deg, var(--blue-primary), var(--pink-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .handbook-sub {
            color: var(--text-mid);
            font-size: 16px;
        }

        .search-bar {
            max-width: 500px;
            margin: 30px auto 0;
        }
        .search-bar input {
            width: 100%;
            padding: 14px 24px;
            border-radius: 60px;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--blue-primary);
        }

        .handbook-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .handbook-card {
            background: var(--card-bg);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .handbook-card:hover {
            transform: translateY(-8px);
            border-color: var(--pink-primary);
            box-shadow: var(--shadow-md);
        }

        .handbook-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--tag-bg);
        }

        .handbook-content {
            padding: 20px;
        }

        .handbook-card-title {
            font-family: 'Fraunces', serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
            color: var(--text-dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .handbook-excerpt {
            font-size: 13px;
            color: var(--text-mid);
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .handbook-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-dim);
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }

        .handbook-stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-dim);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--card-bg);
            border-radius: 32px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .modal-header {
            flex-shrink: 0;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { font-family: 'Fraunces', serif; font-size: 24px; color: var(--blue-primary); }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-dim);
        }
        .modal-close:hover { color: var(--pink-primary); }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Quill alignment styles - giữ căn lề */
        .ql-align-center {
            text-align: center !important;
        }
        .ql-align-right {
            text-align: right !important;
        }
        .ql-align-left {
            text-align: left !important;
        }
        .ql-align-justify {
            text-align: justify !important;
        }

        .ql-indent-1 { padding-left: 3em !important; }
        .ql-indent-2 { padding-left: 6em !important; }
        .ql-indent-3 { padding-left: 9em !important; }
        .ql-indent-4 { padding-left: 12em !important; }
        .ql-indent-5 { padding-left: 15em !important; }
        .ql-indent-6 { padding-left: 18em !important; }
        .ql-indent-7 { padding-left: 21em !important; }
        .ql-indent-8 { padding-left: 24em !important; }

        .modal-content-text {
            font-size: 16px;
            line-height: 1.6;
        }
        .modal-content-text .ql-align-center {
            text-align: center !important;
        }
        .modal-content-text .ql-align-right {
            text-align: right !important;
        }
        .modal-content-text .ql-align-left {
            text-align: left !important;
        }
        .modal-content-text .ql-align-justify {
            text-align: justify !important;
        }
        .modal-content-text .ql-indent-1 { padding-left: 3em !important; }
        .modal-content-text .ql-indent-2 { padding-left: 6em !important; }
        .modal-content-text .ql-indent-3 { padding-left: 9em !important; }
        .modal-content-text .ql-indent-4 { padding-left: 12em !important; }
        .modal-content-text .ql-indent-5 { padding-left: 15em !important; }
        .modal-content-text .ql-indent-6 { padding-left: 18em !important; }
        .modal-content-text .ql-indent-7 { padding-left: 21em !important; }
        .modal-content-text .ql-indent-8 { padding-left: 24em !important; }
        .modal-content-text img { 
            max-width: 100%; 
            border-radius: 16px;
            height: auto;
        }
        .modal-content-text p {
            margin-bottom: 16px;
        }
        .modal-content-text h1, .modal-content-text h2, .modal-content-text h3, 
        .modal-content-text h4, .modal-content-text h5, .modal-content-text h6 {
            margin: 20px 0 12px 0;
            font-family: 'Fraunces', serif;
        }
        .modal-content-text h1 { font-size: 2em; font-weight: bold; }
        .modal-content-text h2 { font-size: 1.5em; font-weight: bold; }
        .modal-content-text h3 { font-size: 1.17em; font-weight: bold; }
        .modal-content-text h4 { font-size: 1em; font-weight: bold; }
        .modal-content-text ul, .modal-content-text ol {
            margin: 10px 0 10px 25px;
        }
        .modal-content-text blockquote {
            border-left: 4px solid var(--pink-primary);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-mid);
        }

        @media (max-width: 1024px) {
            .handbook-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .menu-toggle { display: flex; }
            .handbook-grid { grid-template-columns: 1fr; }
            .handbook-title { font-size: 32px; }
        }

        @media (max-width: 480px) {
            .container { padding: 90px 16px 40px; }
            .handbook-card-title { font-size: 16px; }
        }
    </style>
</head>
<body>
    <nav id="nav">
        <a href="index.html" class="logo">
            <div class="logo-mark"><i class="fas fa-heartbeat"></i></div>
            <div class="logo-type">EduHealth AI</div>
        </a>
        <div class="nav-menu">
            <a href="handbook.html" class="nav-link"><i class="fas fa-book-medical"></i> Cẩm nang y tế</a>
            <a href="checkin.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Check in sức khỏe</a>
            <a href="map.html" class="nav-link"><i class="fas fa-hospital-user"></i> Cơ sở y tế</a>
            <a href="forum.html" class="nav-link"><i class="fas fa-comments"></i> Diễn đàn</a>
        </div>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> <span>Chế độ tối</span></button>
            <button class="menu-toggle" id="menuToggleBtn"><i class="fas fa-bars"></i> Menu</button>
        </div>
    </nav>

    <div class="mobile-menu-panel" id="mobileMenuPanel">
        <div class="nav-links-mobile">
            <a href="handbook.html" class="nav-link-mobile"><i class="fas fa-book-medical"></i> Cẩm nang y tế</a>
            <a href="#" class="nav-link-mobile"><i class="fas fa-clipboard-list"></i> Check in sức khỏe</a>
            <a href="map.html" class="nav-link-mobile"><i class="fas fa-hospital-user"></i> Cơ sở y tế</a>
            <a href="forum.html" class="nav-link-mobile"><i class="fas fa-comments"></i> Diễn đàn</a>
        </div>
    </div>

    <div class="container">
        <div class="handbook-header">
            <h1 class="handbook-title"><i class="fas fa-book-medical"></i> Cẩm nang y tế học đường</h1>
            <p class="handbook-sub">Kiến thức y khoa hữu ích cho học sinh, sinh viên và phụ huynh</p>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm bài viết...">
            </div>
        </div>

        <div id="handbookContainer" class="handbook-grid"></div>
    </div>

    <div id="postModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Bài viết</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCwwBIP4gtGxz8GTbpBYfAu0YgjfhcS-ps",
            authDomain: "eduhealth-4bcab.firebaseapp.com",
            projectId: "eduhealth-4bcab",
            storageBucket: "eduhealth-4bcab.firebasestorage.app",
            messagingSenderId: "390541255938",
            appId: "1:390541255938:web:aa7b5beca0105c28f70e1b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let handbookPosts = [];
        let currentSearchTerm = '';

        async function loadHandbook() {
            try {
                const querySnapshot = await db.collection('handbook').orderBy('createdAt', 'desc').get();
                handbookPosts = [];
                querySnapshot.forEach((doc) => {
                    handbookPosts.push({ id: doc.id, ...doc.data() });
                });
                filterAndDisplay();
            } catch (error) {
                console.error('Lỗi tải cẩm nang:', error);
                document.getElementById('handbookContainer').innerHTML = '<div class="empty-state">⚠️ Lỗi tải dữ liệu. Vui lòng thử lại sau.</div>';
            }
        }

        function filterAndDisplay() {
            let filtered = [...handbookPosts];
            
            if (currentSearchTerm) {
                const term = currentSearchTerm.toLowerCase();
                filtered = filtered.filter(post => 
                    post.title?.toLowerCase().includes(term) || 
                    post.content?.toLowerCase().includes(term)
                );
            }
            
            displayHandbook(filtered);
        }

        function truncateHtml(html, maxLength = 120) {
            const temp = document.createElement('div');
            temp.innerHTML = html;
            const text = temp.textContent || temp.innerText || '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }

        function displayHandbook(posts) {
            const container = document.getElementById('handbookContainer');
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-state">📚 Không tìm thấy bài viết nào phù hợp.</div>';
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="handbook-card" onclick="openPost('${post.id}')">
                    <img class="handbook-cover" src="${post.coverImage}" alt="${escapeHtml(post.title)}" onerror="this.src='https://placehold.co/400x200?text=No+Image'">
                    <div class="handbook-content">
                        <h3 class="handbook-card-title">${escapeHtml(post.title)}</h3>
                        <div class="handbook-excerpt">${truncateHtml(post.content || '', 100)}</div>
                        <div class="handbook-stats">
                            <span><i class="far fa-eye"></i> ${post.views || 0} lượt xem</span>
                            <span><i class="far fa-calendar-alt"></i> ${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleDateString('vi-VN') : 'N/A'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openPost(postId) {
            const post = handbookPosts.find(p => p.id === postId);
            if (!post) return;

            // Tăng lượt xem
            await db.collection('handbook').doc(postId).update({
                views: firebase.firestore.FieldValue.increment(1)
            });
            post.views = (post.views || 0) + 1;

            const modal = document.getElementById('postModal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="modal-content-text">${post.content || ''}</div>
                <div class="handbook-stats" style="margin-top: 24px;">
                    <span><i class="far fa-eye"></i> ${post.views || 0} lượt xem</span>
                    <span><i class="far fa-calendar-alt"></i> ${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString('vi-VN') : 'N/A'}</span>
                </div>
            `;
            
            document.getElementById('modalTitle').innerText = post.title || 'Bài viết';
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('active');
        }

        function handleSearch() {
            currentSearchTerm = document.getElementById('searchInput').value;
            filterAndDisplay();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.openPost = openPost;
        window.closeModal = closeModal;

        document.getElementById('searchInput')?.addEventListener('input', handleSearch);
        document.getElementById('postModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('postModal')) closeModal();
        });

        loadHandbook();

        // Theme toggle
        const themeBtn = document.getElementById('themeToggleBtn');
        const body = document.body;
        function setTheme(theme) {
            body.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('eduhealth-theme', theme);
            const icon = themeBtn.querySelector('i');
            const span = themeBtn.querySelector('span');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
                span.innerText = 'Chế độ sáng';
            } else {
                icon.className = 'fas fa-moon';
                span.innerText = 'Chế độ tối';
            }
        }
        const savedTheme = localStorage.getItem('eduhealth-theme');
        if (savedTheme === 'dark') setTheme('dark');
        else setTheme('light');
        themeBtn.onclick = () => setTheme(body.classList.contains('dark') ? 'light' : 'dark');

        // Mobile menu
        const menuToggle = document.getElementById('menuToggleBtn');
        const mobilePanel = document.getElementById('mobileMenuPanel');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                mobilePanel.classList.toggle('open');
                const icon = menuToggle.querySelector('i');
                if (mobilePanel.classList.contains('open')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
        }
    </script>
</body>
</html>
