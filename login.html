<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Đăng nhập - EduHealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-primary: #3b82f6;
            --blue-deep: #2563eb;
            --pink-primary: #f472b6;
            --pink-deep: #ec489a;
            --grad-blue-pink: linear-gradient(135deg, var(--blue-primary), var(--pink-primary));
            --grad-pink-blue: linear-gradient(135deg, var(--pink-deep), var(--blue-primary));
            --bg-body: #ffffff;
            --bg-surface: #fef9ff;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-dim: #64748b;
            --border-light: #ffe4f0;
            --border-soft: #f1f5f9;
            --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --success: #10b981;
            --danger: #ef4444;
        }

        body.dark {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-dim: #94a3b8;
            --border-light: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        .login-container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-mark {
            width: 52px;
            height: 52px;
            background: var(--grad-blue-pink);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
        }

        .logo-type {
            font-family: 'Fraunces', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink-deep), var(--blue-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-mid);
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--grad-blue-pink);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-mid);
            margin-bottom: 8px;
        }

        .form-group label .required {
            color: var(--danger);
            margin-left: 4px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            background: var(--bg-surface);
            color: var(--text-dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--blue-primary);
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-primary {
            width: 100%;
            background: var(--grad-blue-pink);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-mid);
            font-family: 'DM Sans', sans-serif;
            z-index: 100;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-dim);
        }

        @media (max-width: 480px) {
            .card { padding: 24px; }
            .row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> <span></span></button>

    <div class="login-container">
        <a href="index.html" class="logo">
            <div class="logo-mark"><i class="fas fa-heartbeat"></i></div>
            <div class="logo-type">EduHealth AI</div>
        </a>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" id="loginTabBtn">Đăng nhập</button>
                <button class="tab-btn" id="registerTabBtn">Đăng ký</button>
            </div>

            <div id="loginForm">
                <div id="loginError" class="error-message" style="display: none;"></div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Mật khẩu <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>
                <button class="btn-primary" id="loginBtn">Đăng nhập</button>
            </div>

            <div id="registerForm" style="display: none;">
                <div id="registerError" class="error-message" style="display: none;"></div>
                <div id="registerSuccess" class="success-message" style="display: none;"></div>
                <div class="form-group">
                    <label>Họ và tên <span class="required">*</span></label>
                    <input type="text" id="regFullName" class="form-control" placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label>Số điện thoại <span class="required">*</span></label>
                    <input type="tel" id="regPhone" class="form-control" placeholder="0912345678">
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>Ngày sinh <span class="required">*</span></label>
                        <input type="date" id="regDob" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Giới tính <span class="required">*</span></label>
                        <select id="regGender" class="form-control">
                            <option value="">-- Chọn --</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="regEmail" class="form-control" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Mật khẩu <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" class="form-control" placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword', this)"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="regConfirmPassword" class="form-control" placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regConfirmPassword', this)"></i>
                    </div>
                </div>
                <button class="btn-primary" id="registerBtn">Đăng ký</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
<script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOYFgLyliWFfNWtXHzxDQrbe_ISgmavno",
            authDomain: "eduhealth-4bcab.firebaseapp.com",
            projectId: "eduhealth-4bcab",
            storageBucket: "eduhealth-4bcab.firebasestorage.app",
            messagingSenderId: "390541255938",
            appId: "1:390541255938:web:aa7b5beca0105c28f70e1b",
            measurementId: "G-GSP46EVLYG"
        };

        firebase.initializeApp(firebaseConfig);

        // === TH�M �O?N CODE M?I ===
        // Kh?i t?o App Check v?i reCAPTCHA Enterprise
        const appCheck = firebase.appCheck();
        appCheck.activate(
          new firebase.appCheck.ReCaptchaEnterpriseProvider(
            '6LfZOsIsAAAAAK_vBWSNgolKHjLsfWxGBicixs37'
          ),
          true
        );
        // ===============================

        const auth = firebase.auth();
        const db = firebase.firestore();

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function saveUserToFirestore(userId, userData) {
            await db.collection('users').doc(userId).set({
                fullName: userData.fullName,
                phone: userData.phone,
                dob: userData.dob,
                gender: userData.gender,
                email: userData.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        window.getUserFromFirestore = async function(userId) {
            const doc = await db.collection('users').doc(userId).get();
            if (doc.exists) {
                return doc.data();
            }
            return null;
        };

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            if (!email || !password) {
                errorDiv.textContent = 'Vui lòng nhập đầy đủ email và mật khẩu';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Đang đăng nhập...';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                const userData = await window.getUserFromFirestore(user.uid);
                
                localStorage.setItem('healthUserId', user.uid);
                localStorage.setItem('healthUserEmail', user.email);
                localStorage.setItem('healthUserName', userData?.fullName || user.email.split('@')[0]);
                localStorage.setItem('healthUserPhone', userData?.phone || '');
                localStorage.setItem('healthUserDob', userData?.dob || '');
                localStorage.setItem('healthUserGender', userData?.gender || '');
                localStorage.setItem('healthUserFullData', JSON.stringify(userData || {}));
                
                window.location.href = 'checkin.html';
            } catch (error) {
                let message = 'Đăng nhập thất bại';
                if (error.code === 'auth/user-not-found') message = 'Email chưa được đăng ký';
                else if (error.code === 'auth/wrong-password') message = 'Mật khẩu không đúng';
                else if (error.code === 'auth/invalid-email') message = 'Email không hợp lệ';
                else message = error.message;
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Đăng nhập';
            }
        };

        document.getElementById('registerBtn').onclick = async () => {
            const fullName = document.getElementById('regFullName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const dob = document.getElementById('regDob').value;
            const gender = document.getElementById('regGender').value;
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!fullName || !phone || !dob || !gender || !email || !password || !confirmPassword) {
                errorDiv.textContent = 'Vui lòng nhập đầy đủ tất cả thông tin';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Mật khẩu xác nhận không khớp';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
                errorDiv.style.display = 'block';
                return;
            }

            const phoneRegex = /^[0-9]{10,11}$/;
            if (!phoneRegex.test(phone)) {
                errorDiv.textContent = 'Số điện thoại không hợp lệ (10-11 số)';
                errorDiv.style.display = 'block';
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Email không hợp lệ';
                errorDiv.style.display = 'block';
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Đang đăng ký...';

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await saveUserToFirestore(user.uid, {
                    fullName: fullName,
                    phone: phone,
                    dob: dob,
                    gender: gender,
                    email: email
                });

                localStorage.setItem('healthUserId', user.uid);
                localStorage.setItem('healthUserEmail', email);
                localStorage.setItem('healthUserName', fullName);
                localStorage.setItem('healthUserPhone', phone);
                localStorage.setItem('healthUserDob', dob);
                localStorage.setItem('healthUserGender', gender);
                localStorage.setItem('healthUserFullData', JSON.stringify({
                    fullName: fullName,
                    phone: phone,
                    dob: dob,
                    gender: gender,
                    email: email
                }));

                successDiv.textContent = 'Đăng ký thành công! Đang chuyển hướng...';
                successDiv.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'checkin.html';
                }, 1500);
            } catch (error) {
                let message = 'Đăng ký thất bại';
                if (error.code === 'auth/email-already-in-use') message = 'Email này đã được đăng ký';
                else if (error.code === 'auth/invalid-email') message = 'Email không hợp lệ';
                else if (error.code === 'auth/weak-password') message = 'Mật khẩu quá yếu';
                else message = error.message;
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Đăng ký';
            }
        };

        // Switch tabs
        document.getElementById('loginTabBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTabBtn').classList.add('active');
            document.getElementById('registerTabBtn').classList.remove('active');
        };

        document.getElementById('registerTabBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerTabBtn').classList.add('active');
            document.getElementById('loginTabBtn').classList.remove('active');
        };

        // Theme toggle
        const themeBtn = document.getElementById('themeToggleBtn');
        const body = document.body;
        function setTheme(theme) {
            body.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('eduhealth-theme', theme);
            const icon = themeBtn.querySelector('i');
            const span = themeBtn.querySelector('span');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
                span.innerText = 'Sáng';
            } else {
                icon.className = 'fas fa-moon';
                span.innerText = 'Tối';
            }
        }
        const savedTheme = localStorage.getItem('eduhealth-theme');
        setTheme(savedTheme === 'dark' ? 'dark' : 'light');
        themeBtn.onclick = () => setTheme(body.classList.contains('dark') ? 'light' : 'dark');

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user && window.location.pathname.includes('login.html')) {
                window.location.href = 'checkin.html';
            }
        });
    </script>
</body>
</html>
