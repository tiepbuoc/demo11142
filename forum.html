<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Diễn đàn Y tế Học đường - EduHealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --blue-primary: #3b82f6;
            --blue-deep: #2563eb;
            --pink-primary: #f472b6;
            --pink-deep: #ec489a;
            --grad-blue-pink: linear-gradient(135deg, var(--blue-primary), var(--pink-primary));
            --grad-pink-blue: linear-gradient(135deg, var(--pink-deep), var(--blue-primary));
            --bg-body: #ffffff;
            --bg-surface: #fef9ff;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-dim: #64748b;
            --border-light: #ffe4f0;
            --border-soft: #f1f5f9;
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --hover-glow: rgba(59, 130, 246, 0.12);
            --nav-bg: rgba(255, 255, 255, 0.92);
            --tag-bg: #fce7f3;
            --input-bg: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body.dark {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-dim: #94a3b8;
            --border-light: #334155;
            --border-soft: #2d3a4e;
            --nav-bg: rgba(15, 23, 42, 0.94);
            --tag-bg: #2d3a4e;
            --input-bg: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--border-soft); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--pink-primary); border-radius: 10px; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            height: 74px;
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border-light);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-mark {
            width: 42px;
            height: 42px;
            background: var(--grad-blue-pink);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .logo-type {
            font-family: 'Fraunces', serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink-deep), var(--blue-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu { display: flex; align-items: center; gap: 32px; }
        .nav-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-mid);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link i { color: var(--pink-primary); }
        .nav-link:hover { color: var(--blue-primary); }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-mid);
            font-family: 'DM Sans', sans-serif;
        }
        .theme-toggle:hover { border-color: var(--blue-primary); color: var(--blue-primary); }

        .menu-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            color: var(--pink-primary);
            cursor: pointer;
            align-items: center;
            gap: 8px;
        }
        .menu-toggle:hover { background: var(--grad-pink-blue); color: white; border-color: transparent; }

        .nav-right { display: flex; align-items: center; gap: 16px; }

        .mobile-menu-panel {
            position: fixed;
            top: 74px;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            z-index: 99;
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            pointer-events: none;
        }
        .mobile-menu-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .mobile-menu-panel .nav-links-mobile {
            display: flex;
            flex-direction: column;
            padding: 24px 6%;
            gap: 20px;
        }
        .mobile-menu-panel .nav-link-mobile {
            padding: 12px 0;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border-light);
        }
        .mobile-menu-panel .nav-link-mobile i { width: 28px; color: var(--blue-primary); font-size: 18px; }

        /* Main Content */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }

        .forum-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .forum-title {
            font-family: 'Fraunces', serif;
            font-size: 36px;
            font-weight: 500;
            background: linear-gradient(90deg, var(--blue-primary), var(--pink-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Search and Filter Bar */
        .search-filter-bar {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px 24px;
            border: 2px solid var(--border-light);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .search-box {
            flex: 2;
            min-width: 200px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-dark);
            font-family: 'DM Sans', sans-serif;
        }
        .filter-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border-light);
            background: transparent;
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }
        .filter-btn.active {
            background: var(--grad-blue-pink);
            border-color: transparent;
            color: white;
        }

        .btn-primary {
            background: var(--grad-blue-pink);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }

        /* Post Card */
        .post-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 2px solid var(--border-light);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .post-card:hover {
            transform: translateY(-4px);
            border-color: var(--pink-primary);
            box-shadow: var(--shadow-md);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--grad-blue-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .post-meta { flex: 1; }
        .post-author { font-weight: 700; font-size: 16px; }
        .post-time { font-size: 12px; color: var(--text-dim); }

        .post-title {
            font-family: 'Fraunces', serif;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .post-excerpt {
            color: var(--text-mid);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .post-stats {
            display: flex;
            gap: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            color: var(--text-dim);
            font-size: 14px;
        }

        .post-stats span {
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .post-stats span:hover { color: var(--pink-primary); }
        .post-stats .liked i { color: var(--pink-primary); }
        .post-stats .liked { color: var(--pink-primary); }

        .post-type-badge {
            background: var(--tag-bg);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 12px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--card-bg);
            border-radius: 32px;
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .modal-header {
            flex-shrink: 0;
            background: var(--card-bg);
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .modal-header h3 { font-family: 'Fraunces', serif; font-size: 24px; color: var(--blue-primary); }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-dim);
        }
        .modal-close:hover { color: var(--pink-primary); }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Post Content Box */
        .post-content-box {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 2px solid var(--border-light);
        }

        /* ========== CONTENT VIEW STYLES - GIỮ NGUYÊN ĐỊNH DẠNG ========== */
        .modal-content-text {
            font-size: 16px;
            line-height: 1.7;
            color: var(--text-mid);
        }

        .modal-content-text * {
            max-width: 100%;
        }

        .modal-content-text p {
            margin-bottom: 1.2em;
        }

        .modal-content-text h1 {
            font-size: 1.8em;
            font-weight: 600;
            margin: 1.2em 0 0.6em;
            font-family: 'Fraunces', serif;
            color: var(--text-dark);
        }

        .modal-content-text h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin: 1em 0 0.5em;
            font-family: 'Fraunces', serif;
            color: var(--text-dark);
        }

        .modal-content-text h3 {
            font-size: 1.3em;
            font-weight: 600;
            margin: 0.8em 0 0.4em;
            font-family: 'Fraunces', serif;
            color: var(--text-dark);
        }

        .modal-content-text h4 {
            font-size: 1.1em;
            font-weight: 600;
            margin: 0.6em 0 0.3em;
            font-family: 'Fraunces', serif;
            color: var(--text-dark);
        }

        .modal-content-text h5, .modal-content-text h6 {
            font-size: 1em;
            font-weight: 600;
            margin: 0.5em 0 0.2em;
            font-family: 'Fraunces', serif;
            color: var(--text-dark);
        }

        .modal-content-text ul, 
        .modal-content-text ol {
            margin: 0.8em 0 0.8em 1.8em;
            padding-left: 0;
        }

        .modal-content-text li {
            margin: 0.3em 0;
            line-height: 1.6;
        }

        .modal-content-text img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            margin: 1em 0;
            display: block;
        }

        .modal-content-text a {
            color: var(--blue-primary);
            text-decoration: none;
        }

        .modal-content-text a:hover {
            text-decoration: underline;
        }

        .modal-content-text blockquote {
            border-left: 4px solid var(--pink-primary);
            padding-left: 1.2em;
            margin: 1em 0;
            color: var(--text-dim);
            font-style: italic;
        }

        .modal-content-text code {
            background: var(--tag-bg);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .modal-content-text pre {
            background: var(--bg-surface);
            padding: 1em;
            border-radius: 12px;
            overflow-x: auto;
            margin: 1em 0;
        }

        .modal-content-text pre code {
            background: none;
            padding: 0;
        }

        .modal-content-text table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
        }

        .modal-content-text th,
        .modal-content-text td {
            border: 1px solid var(--border-light);
            padding: 8px 12px;
            text-align: left;
        }

        .modal-content-text th {
            background: var(--bg-surface);
            font-weight: 600;
        }

        .modal-content-text hr {
            border: none;
            border-top: 1px solid var(--border-light);
            margin: 1.5em 0;
        }

        /* Căn lề quan trọng - giữ nguyên style từ Word/Admin */
        .modal-content-text .ql-align-center {
            text-align: center !important;
        }

        .modal-content-text .ql-align-right {
            text-align: right !important;
        }

        .modal-content-text .ql-align-left {
            text-align: left !important;
        }

        .modal-content-text .ql-align-justify {
            text-align: justify !important;
        }

        .modal-content-text .ql-indent-1 { padding-left: 2em !important; }
        .modal-content-text .ql-indent-2 { padding-left: 4em !important; }
        .modal-content-text .ql-indent-3 { padding-left: 6em !important; }
        .modal-content-text .ql-indent-4 { padding-left: 8em !important; }
        .modal-content-text .ql-indent-5 { padding-left: 10em !important; }
        .modal-content-text .ql-indent-6 { padding-left: 12em !important; }
        .modal-content-text .ql-indent-7 { padding-left: 14em !important; }
        .modal-content-text .ql-indent-8 { padding-left: 16em !important; }

        .modal-content-text strong, 
        .modal-content-text b {
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-content-text em, 
        .modal-content-text i {
            font-style: italic;
        }

        .post-content {
            font-size: 16px;
            line-height: 1.6;
        }

        /* Post Stats inside modal */
        .modal-post-stats {
            display: flex;
            gap: 24px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            color: var(--text-dim);
            font-size: 14px;
        }
        .modal-post-stats span {
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .modal-post-stats span:hover { color: var(--pink-primary); }
        .modal-post-stats .liked i { color: var(--pink-primary); }
        .modal-post-stats .liked { color: var(--pink-primary); }

        /* Comment Section Box */
        .comment-section-box {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 24px;
            border: 2px solid var(--border-light);
        }

        .comment-input-group { margin-bottom: 16px; }
        .comment-input-group input, .comment-input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-dark);
            font-family: 'DM Sans', sans-serif;
        }

        /* Comments List */
        .comments-list {
            margin-top: 20px;
            padding-top: 10px;
        }
        .comment-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            border: 1px solid var(--border-light);
        }
        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--grad-blue-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }
        .comment-content {
            flex: 1;
        }
        .comment-author { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .comment-text { font-size: 14px; color: var(--text-mid); line-height: 1.4; }
        .comment-time { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

        /* Quiz Styles */
        .quiz-option {
            background: var(--tag-bg);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            color: var(--text-dark);
        }
        .quiz-option:hover { background: var(--blue-primary); color: white; }
        .quiz-option.correct { background: var(--success); color: white; border-color: var(--success); }
        .quiz-option.wrong { background: var(--danger); color: white; border-color: var(--danger); }
        .quiz-option.selected { border-color: var(--pink-primary); }

        /* Poll Styles */
        .poll-option {
            background: var(--tag-bg);
            border-radius: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-light);
        }
        .poll-bar {
            background: linear-gradient(90deg, var(--pink-primary), var(--pink-deep));
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            border-radius: 16px;
            transition: width 0.3s ease;
            opacity: 0.7;
            z-index: 0;
        }
        .poll-text {
            position: relative;
            z-index: 1;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 400;
            color: var(--text-mid);
        }
        .poll-percent {
            font-weight: 500;
            color: var(--blue-primary);
        }
        .poll-option:hover { transform: scale(1.01); }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-dim);
        }

        /* Quill alignment styles - giữ nguyên định dạng */
        .ql-align-center {
            text-align: center !important;
        }
        .ql-align-right {
            text-align: right !important;
        }
        .ql-align-left {
            text-align: left !important;
        }
        .ql-align-justify {
            text-align: justify !important;
        }

        .ql-indent-1 { padding-left: 3em !important; }
        .ql-indent-2 { padding-left: 6em !important; }
        .ql-indent-3 { padding-left: 9em !important; }
        .ql-indent-4 { padding-left: 12em !important; }
        .ql-indent-5 { padding-left: 15em !important; }
        .ql-indent-6 { padding-left: 18em !important; }
        .ql-indent-7 { padding-left: 21em !important; }
        .ql-indent-8 { padding-left: 24em !important; }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .menu-toggle { display: flex; }
            .forum-header { flex-direction: column; align-items: stretch; }
            .btn-primary { justify-content: center; }
            .modal-content { max-width: 95%; max-height: 85vh; }
            .search-filter-bar { flex-direction: column; align-items: stretch; }
            .filter-box { justify-content: center; }
            .modal-content-text { font-size: 15px; }
            .modal-content-text h1 { font-size: 1.5em; }
            .modal-content-text h2 { font-size: 1.3em; }
            .modal-content-text ul, 
            .modal-content-text ol {
                margin-left: 1.2em;
            }
        }

        @media (max-width: 480px) {
            .modal-content-text h1 { font-size: 1.3em; }
            .modal-content-text h2 { font-size: 1.2em; }
            .modal-content-text h3 { font-size: 1.1em; }
        }
    </style>
</head>
<body>
    <nav id="nav">
        <a href="index.html" class="logo">

    <div class="container">
        <div class="forum-header">
            <h1 class="forum-title"><i class="fas fa-comments"></i> Diễn đàn Y tế Học đường</h1>
            <a href="create-post.html" class="btn-primary"><i class="fas fa-plus"></i> Chia sẻ bài viết</a>
        </div>

        <!-- Search and Filter Bar -->
        <div class="search-filter-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm bài viết theo tiêu đề hoặc nội dung...">
            </div>
            <div class="filter-box">
                <button class="filter-btn active" data-filter="all">📌 Tất cả</button>
                <button class="filter-btn" data-filter="normal">📝 Bài viết</button>
                <button class="filter-btn" data-filter="infographic">🖼️ Infographic</button>
                <button class="filter-btn" data-filter="video">🎬 Video</button>
                <button class="filter-btn" data-filter="quiz">❓ Trắc nghiệm</button>
                <button class="filter-btn" data-filter="poll">📊 Khảo sát</button>
            </div>
        </div>

    <div id="postModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Bài đăng</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
<script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOYFgLyliWFfNWtXHzxDQrbe_ISgmavno",
            authDomain: "eduhealth-4bcab.firebaseapp.com",
            projectId: "eduhealth-4bcab",
            storageBucket: "eduhealth-4bcab.firebasestorage.app",
            messagingSenderId: "390541255938",
            appId: "1:390541255938:web:aa7b5beca0105c28f70e1b"
        };

        firebase.initializeApp(firebaseConfig);

        // === TH�M �O?N CODE M?I ===
        // Kh?i t?o App Check v?i reCAPTCHA Enterprise
        const appCheck = firebase.appCheck();
        appCheck.activate(
          new firebase.appCheck.ReCaptchaEnterpriseProvider(
            '6LfZOsIsAAAAAK_vBWSNgolKHjLsfWxGBicixs37'
          ),
          true
        );
        // ===============================

        const db = firebase.firestore();

        let posts = [];
        let currentPostId = null;
        let currentPostData = null;
        
        // Local storage keys
        const STORAGE_KEYS = {
            LIKED_POSTS: 'eduhealth_liked_posts',
            POLL_VOTES: 'eduhealth_poll_votes'
        };
        
        // Load user data from localStorage
        let userLikedPosts = new Set();
        let userPollVotes = new Set();
        
        function loadUserData() {
            const savedLikes = localStorage.getItem(STORAGE_KEYS.LIKED_POSTS);
            if (savedLikes) {
                userLikedPosts = new Set(JSON.parse(savedLikes));
            }
            const savedPollVotes = localStorage.getItem(STORAGE_KEYS.POLL_VOTES);
            if (savedPollVotes) {
                userPollVotes = new Set(JSON.parse(savedPollVotes));
            }
        }
        
        function saveLikedPosts() {
            localStorage.setItem(STORAGE_KEYS.LIKED_POSTS, JSON.stringify([...userLikedPosts]));
        }
        
        function savePollVotes() {
            localStorage.setItem(STORAGE_KEYS.POLL_VOTES, JSON.stringify([...userPollVotes]));
        }

        // Search and filter variables
        let currentTypeFilter = 'all';
        let currentSearchTerm = '';

        async function loadPosts() {
            try {
                const querySnapshot = await db.collection('posts')
                    .where('status', '==', 'approved')
                    .orderBy('createdAt', 'desc')
                    .get();
                posts = [];
                querySnapshot.forEach((doc) => {
                    posts.push({ id: doc.id, ...doc.data() });
                });
                filterAndDisplayPosts();
            } catch (error) {
                console.error('Lỗi tải bài đăng:', error);
                document.getElementById('postsContainer').innerHTML = '<div class="empty-state">⚠️ Lỗi tải dữ liệu. Vui lòng thử lại sau.</div>';
            }
        }

        function filterAndDisplayPosts() {
            let filtered = [...posts];
            
            if (currentTypeFilter !== 'all') {
                filtered = filtered.filter(post => post.type === currentTypeFilter);
            }
            
            if (currentSearchTerm) {
                const term = currentSearchTerm.toLowerCase();
                filtered = filtered.filter(post => 
                    post.title?.toLowerCase().includes(term) || 
                    post.content?.toLowerCase().includes(term) ||
                    post.author?.toLowerCase().includes(term)
                );
            }
            
            displayPosts(filtered);
        }

        function stripHtml(html, maxLength = 120) {
            const temp = document.createElement('div');
            temp.innerHTML = html;
            const text = temp.textContent || temp.innerText || '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }

        function getTypeIcon(type) {
            switch(type) {
                case 'infographic': return '<i class="fas fa-image"></i>';
                case 'video': return '<i class="fas fa-video"></i>';
                case 'quiz': return '<i class="fas fa-question-circle"></i>';
                case 'poll': return '<i class="fas fa-chart-bar"></i>';
                default: return '<i class="fas fa-file-alt"></i>';
            }
        }

        function displayPosts(postsToShow) {
            const container = document.getElementById('postsContainer');
            if (postsToShow.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ Không tìm thấy bài viết nào phù hợp.</div>';
                return;
            }

            container.innerHTML = postsToShow.map(post => {
                const isLiked = userLikedPosts.has(post.id);
                return `
                    <div class="post-card" onclick="openPost('${post.id}')">
                        <div class="post-header">
                            <div class="avatar">${post.author ? post.author.charAt(0).toUpperCase() : 'U'}</div>
                            <div class="post-meta">
                                <div class="post-author">
                                    ${escapeHtml(post.author || 'Ẩn danh')}
                                    <span class="post-type-badge">${getTypeIcon(post.type)} ${post.type || 'normal'}</span>
                                </div>
                                <div class="post-time">${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString('vi-VN') : 'N/A'}</div>
                            </div>
                        </div>
                        <div class="post-title">${escapeHtml(post.title || 'Không có tiêu đề')}</div>
                        <div class="post-excerpt">${stripHtml(post.content || '', 120)}</div>
                        <div class="post-stats">
                            <span onclick="event.stopPropagation(); toggleLike('${post.id}')" class="${isLiked ? 'liked' : ''}">
                                <i class="fas fa-heart"></i> ${post.likes || 0} thích
                            </span>
                            <span><i class="far fa-comment"></i> ${post.comments?.length || 0} bình luận</span>
                            <span><i class="far fa-eye"></i> ${post.views || 0} lượt xem</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            if (userLikedPosts.has(postId)) {
                await db.collection('posts').doc(postId).update({
                    likes: firebase.firestore.FieldValue.increment(-1)
                });
                userLikedPosts.delete(postId);
                post.likes = (post.likes || 0) - 1;
            } else {
                await db.collection('posts').doc(postId).update({
                    likes: firebase.firestore.FieldValue.increment(1)
                });
                userLikedPosts.add(postId);
                post.likes = (post.likes || 0) + 1;
            }
            saveLikedPosts();
            filterAndDisplayPosts();
            
            // If modal is open and showing this post, update the modal stats
            if (currentPostId === postId && currentPostData) {
                updateModalStats();
            }
        }
        
        function updateModalStats() {
            if (!currentPostData) return;
            const isLiked = userLikedPosts.has(currentPostId);
            const statsContainer = document.getElementById('modalStatsContainer');
            if (statsContainer) {
                statsContainer.innerHTML = `
                    <div class="modal-post-stats">
                        <span onclick="toggleLikeFromModal()" class="${isLiked ? 'liked' : ''}" id="modalLikeBtn">
                            <i class="fas fa-heart"></i> ${currentPostData.likes || 0} thích
                        </span>
                        <span><i class="far fa-comment"></i> ${currentPostData.comments?.length || 0} bình luận</span>
                        <span><i class="far fa-eye"></i> ${currentPostData.views || 0} lượt xem</span>
                    </div>
                `;
            }
        }
        
        async function toggleLikeFromModal() {
            if (!currentPostData) return;
            await toggleLike(currentPostId);
            const updatedPost = posts.find(p => p.id === currentPostId);
            if (updatedPost) {
                currentPostData = updatedPost;
                updateModalStats();
            }
        }

        async function openPost(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            currentPostId = postId;
            currentPostData = post;

            await db.collection('posts').doc(postId).update({
                views: firebase.firestore.FieldValue.increment(1)
            });
            post.views = (post.views || 0) + 1;

            const freshPost = await db.collection('posts').doc(postId).get();
            const comments = freshPost.data()?.comments || [];
            const isLiked = userLikedPosts.has(postId);

            const modal = document.getElementById('postModal');
            const modalBody = document.getElementById('modalBody');
            
            let videoHtml = '';
            if (post.type === 'video' && post.videoUrl) {
                let embedUrl = post.videoUrl;
                if (post.videoUrl.includes('youtube.com/watch')) {
                    const vid = post.videoUrl.split('v=')[1]?.split('&')[0];
                    if (vid) embedUrl = `https://www.youtube.com/embed/${vid}`;
                }
                videoHtml = `<div style="position:relative; padding-bottom:56.25%; margin-bottom:20px;"><iframe src="${embedUrl}" style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:16px;" frameborder="0" allowfullscreen></iframe></div>`;
            }
            
            let imageHtml = '';
            if (post.type === 'infographic' && post.imageUrl) {
                imageHtml = `<img src="${post.imageUrl}" style="max-width:100%; border-radius:20px; margin-top:20px;" onerror="this.src='https://placehold.co/800x400?text=Image+not+found'">`;
            }

            let quizHtml = '';
            if (post.type === 'quiz' && post.quizData) {
                quizHtml = `<div id="quizContainer" style="margin: 20px 0;"></div>`;
                setTimeout(() => {
                    const qc = document.getElementById('quizContainer');
                    if (qc && post.quizData.questions) {
                        qc.innerHTML = post.quizData.questions.map((q, idx) => `
                            <div style="margin-bottom: 24px;">
                                <strong style="font-size:16px;">Câu ${idx+1}: ${escapeHtml(q.question)}</strong>
                                ${q.options.map((opt, oi) => `
                                    <div class="quiz-option" onclick="selectQuizAnswer(${idx}, ${oi}, ${q.correct})" data-q="${idx}" data-opt="${oi}" data-correct="${q.correct}">
                                        ${String.fromCharCode(65+oi)}. ${escapeHtml(opt)}
                                    </div>
                                `).join('')}
                            </div>
                        `).join('');
                    }
                }, 50);
            }

            let pollHtml = '';
            if (post.type === 'poll' && post.pollData) {
                const totalVotes = post.pollData.votes?.reduce((a, b) => a + b, 0) || 0;
                const hasVoted = userPollVotes.has(postId);
                pollHtml = `<div id="pollContainer" style="margin: 20px 0;"></div>`;
                setTimeout(() => {
                    const pc = document.getElementById('pollContainer');
                    if (pc && post.pollData.options) {
                        if (hasVoted) {
                            pc.innerHTML = post.pollData.options.map((opt, idx) => {
                                const votes = post.pollData.votes?.[idx] || 0;
                                const percent = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
                                return `
                                    <div class="poll-option">
                                        <div class="poll-bar" style="width: ${percent}%;"></div>
                                        <div class="poll-text">
                                            <span>${escapeHtml(opt)}</span>
                                            <span class="poll-percent">${percent}% (${votes} phiếu)</span>
                                        </div>
                                    </div>
                                `;
                            }).join('');
                        } else {
                            pc.innerHTML = post.pollData.options.map((opt, idx) => `
                                <div class="poll-option" onclick="votePoll(${idx})" data-poll-idx="${idx}">
                                    <div class="poll-text">
                                        <span>${escapeHtml(opt)}</span>
                                        <span class="poll-percent"></span>
                                    </div>
                                </div>
                            `).join('');
                        }
                    }
                }, 50);
            }

            // Sử dụng class modal-content-text để giữ nguyên định dạng
            modalBody.innerHTML = `
                <div class="post-content-box">
                    <div class="modal-content-text">
                        ${videoHtml}
                        <div>${post.content || ''}</div>
                        ${post.type === 'infographic' ? imageHtml : ''}
                        ${quizHtml}
                        ${pollHtml}
                    </div>
                    <div id="modalStatsContainer">
                        <div class="modal-post-stats">
                            <span onclick="toggleLikeFromModal()" class="${isLiked ? 'liked' : ''}" id="modalLikeBtn">
                                <i class="fas fa-heart"></i> ${post.likes || 0} thích
                            </span>
                            <span><i class="far fa-comment"></i> ${post.comments?.length || 0} bình luận</span>
                            <span><i class="far fa-eye"></i> ${post.views || 0} lượt xem</span>
                        </div>
                    </div>
                </div>
                <div class="comment-section-box">
                    <h6 style="margin-bottom:16px;">💬 Bình luận (${comments.length})</h6>
                    <div class="comment-input-group">
                        <input type="text" id="commentName" placeholder="Tên của bạn (để trống = Ẩn danh)">
                    </div>
                    <div class="comment-input-group">
                        <textarea id="commentText" rows="3" placeholder="Nội dung bình luận..."></textarea>
                    </div>
                    <button class="btn-primary" style="padding:8px 20px; margin-bottom:20px;" onclick="addComment()">Gửi bình luận</button>
                    <div class="comments-list" id="commentsList">
                        ${comments.map(c => `
                            <div class="comment-item">
                                <div class="comment-avatar">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div class="comment-content">
                                    <div class="comment-author">${escapeHtml(c.author)}</div>
                                    <div class="comment-text">${escapeHtml(c.text)}</div>
                                    <div class="comment-time">${new Date(c.timestamp).toLocaleString('vi-VN')}</div>
                                </div>
                            </div>
                        `).join('') || '<div class="empty-state" style="padding:20px;">Chưa có bình luận nào. Hãy là người đầu tiên bình luận!</div>'}
                    </div>
                </div>
            `;
            
            document.getElementById('modalTitle').innerText = post.title || 'Bài đăng';
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('active');
            currentPostId = null;
            currentPostData = null;
        }

        async function addComment() {
            const name = document.getElementById('commentName')?.value.trim();
            const text = document.getElementById('commentText')?.value.trim();
            
            if (!text) {
                alert('Vui lòng nhập nội dung bình luận!');
                return;
            }

            const comment = {
                author: name || 'Ẩn danh',
                text: text,
                timestamp: new Date().toISOString()
            };

            try {
                const postRef = db.collection('posts').doc(currentPostId);
                const postDoc = await postRef.get();
                const currentComments = postDoc.data()?.comments || [];
                await postRef.update({ comments: [...currentComments, comment] });
                
                const post = posts.find(p => p.id === currentPostId);
                if (post) post.comments = [...currentComments, comment];
                if (currentPostData) currentPostData.comments = [...currentComments, comment];
                document.getElementById('commentText').value = '';
                openPost(currentPostId);
            } catch (error) {
                alert('Lỗi khi gửi bình luận: ' + error.message);
            }
        }

        // Quiz functions
        window.selectQuizAnswer = (qIdx, optIdx, correctIdx) => {
            const options = document.querySelectorAll(`.quiz-option[data-q="${qIdx}"]`);
            const selected = document.querySelector(`.quiz-option[data-q="${qIdx}"][data-opt="${optIdx}"]`);
            
            options.forEach(opt => {
                const optVal = parseInt(opt.dataset.opt);
                const isCorrect = (optVal === correctIdx);
                
                if (isCorrect) {
                    opt.classList.add('correct');
                } else if (opt === selected) {
                    opt.classList.add('wrong');
                }
                
                if (opt === selected) {
                    opt.classList.add('selected');
                }
            });
        };

        // Poll function
        window.votePoll = async (optionIdx) => {
            const post = posts.find(p => p.id === currentPostId);
            if (!post?.pollData) return;
            
            if (userPollVotes.has(currentPostId)) {
                alert('Bạn đã tham gia khảo sát này rồi!');
                return;
            }
            
            const votes = [...(post.pollData.votes || new Array(post.pollData.options.length).fill(0))];
            votes[optionIdx]++;
            await db.collection('posts').doc(currentPostId).update({ 'pollData.votes': votes });
            post.pollData.votes = votes;
            if (currentPostData) currentPostData.pollData.votes = votes;
            
            userPollVotes.add(currentPostId);
            savePollVotes();
            
            const totalVotes = votes.reduce((a, b) => a + b, 0);
            const pc = document.getElementById('pollContainer');
            if (pc) {
                pc.innerHTML = post.pollData.options.map((opt, idx) => {
                    const voteCount = votes[idx] || 0;
                    const percent = totalVotes > 0 ? Math.round((voteCount / totalVotes) * 100) : 0;
                    return `
                        <div class="poll-option">
                            <div class="poll-bar" style="width: ${percent}%;"></div>
                            <div class="poll-text">
                                <span>${escapeHtml(opt)}</span>
                                <span class="poll-percent">${percent}% (${voteCount} phiếu)</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        };

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Search and filter event handlers
        function handleSearch() {
            currentSearchTerm = document.getElementById('searchInput').value;
            filterAndDisplayPosts();
        }

        function handleTypeFilter(type) {
            currentTypeFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === type) btn.classList.add('active');
            });
            filterAndDisplayPosts();
        }

        window.openPost = openPost;
        window.toggleLike = toggleLike;
        window.toggleLikeFromModal = toggleLikeFromModal;
        window.addComment = addComment;
        window.closeModal = closeModal;
        window.selectQuizAnswer = selectQuizAnswer;
        window.votePoll = votePoll;

        // Initialize
        loadUserData();
        
        // Event listeners for search and filter
        document.getElementById('searchInput')?.addEventListener('input', handleSearch);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => handleTypeFilter(btn.dataset.filter));
        });

        loadPosts();

        // Theme toggle
        const themeBtn = document.getElementById('themeToggleBtn');
        const body = document.body;
        function setTheme(theme) {
            body.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('eduhealth-theme', theme);
            const icon = themeBtn.querySelector('i');
            const span = themeBtn.querySelector('span');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
                span.innerText = 'Chế độ sáng';
            } else {
                icon.className = 'fas fa-moon';
                span.innerText = 'Chế độ tối';
            }
        }
        const savedTheme = localStorage.getItem('eduhealth-theme');
        if (savedTheme === 'dark') setTheme('dark');
        else setTheme('light');
        themeBtn.onclick = () => setTheme(body.classList.contains('dark') ? 'light' : 'dark');

        // Mobile menu
        const menuToggle = document.getElementById('menuToggleBtn');
        const mobilePanel = document.getElementById('mobileMenuPanel');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                mobilePanel.classList.toggle('open');
                const icon = menuToggle.querySelector('i');
                if (mobilePanel.classList.contains('open')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
        }

        document.getElementById('postModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('postModal')) closeModal();
        });
    </script>
</body>
</html>
