
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản trị hệ thống - EduHealth AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --blue-primary: #3b82f6;
            --blue-deep: #2563eb;
            --pink-primary: #f472b6;
            --pink-deep: #ec489a;
            --grad-blue-pink: linear-gradient(135deg, var(--blue-primary), var(--pink-primary));
            --grad-pink-blue: linear-gradient(135deg, var(--pink-deep), var(--blue-primary));
            --bg-body: linear-gradient(135deg, #ffffff 0%, #fff5f8 100%);
            --bg-surface: #fff5f8;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-dim: #64748b;
            --border-light: #ffe0ec;
            --border-soft: #fef0f5;
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --nav-bg: rgba(255, 255, 255, 0.95);
            --tag-bg: #fce7f3;
            --input-bg: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --level1: #10b981;
            --level2: #f59e0b;
            --level3: #ef4444;
        }

        body.dark {
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            --bg-surface: #1e293b;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-dim: #94a3b8;
            --border-light: #334155;
            --border-soft: #2d3a4e;
            --nav-bg: rgba(15, 23, 42, 0.95);
            --tag-bg: #2d3a4e;
            --input-bg: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-body); color: var(--text-dark); min-height: 100vh; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--border-soft); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--pink-primary); border-radius: 10px; }

        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 6%; height: 74px; background: var(--nav-bg); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border-light); }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-mark { width: 42px; height: 42px; background: linear-gradient(135deg, var(--pink-deep), var(--blue-primary)); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .logo-type { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--pink-deep), var(--blue-primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-menu { display: flex; align-items: center; gap: 32px; }
        .nav-link { font-size: 14px; font-weight: 500; color: var(--text-mid); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-link i { color: var(--pink-primary); }
        .nav-link:hover { color: var(--blue-primary); }
        .theme-toggle { background: transparent; border: 1px solid var(--border-light); border-radius: 40px; padding: 8px 16px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-mid); }
        .theme-toggle:hover { border-color: var(--blue-primary); color: var(--blue-primary); }

        .admin-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px 60px; }
        .admin-header { margin-bottom: 32px; }
        .admin-header h1 { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 500; background: linear-gradient(135deg, var(--blue-primary), var(--pink-primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 12px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); border-radius: 24px; padding: 24px 20px; border: 1px solid var(--border-light); text-align: center; }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--pink-primary); }
        .stat-number { font-size: 36px; font-weight: 700; font-family: 'Fraunces', serif; background: linear-gradient(135deg, var(--blue-primary), var(--pink-primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        .checkin-list { background: var(--card-bg); border-radius: 32px; padding: 24px; border: 1px solid var(--border-light); }
        .checkin-item { background: var(--bg-surface); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border-light); transition: all 0.3s; }
        .checkin-item:hover { transform: translateX(5px); border-color: var(--pink-primary); }
        .flex-between { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
        .flex-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-pdf { background: linear-gradient(135deg, #ef4444, #f97316); border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
        .btn-pdf:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--border-light); padding: 8px 20px; border-radius: 40px; color: var(--text-mid); cursor: pointer; }
        .btn-outline:hover { border-color: var(--blue-primary); color: var(--blue-primary); }
        .btn-danger { background: var(--danger); border: none; padding: 6px 14px; border-radius: 30px; color: white; cursor: pointer; font-size: 13px; }

        .badge-level { padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        .level-1 { background: #10b98120; color: #10b981; }
        .level-2 { background: #f59e0b20; color: #f59e0b; }
        .level-3 { background: #ef444420; color: #ef4444; }

        .toast-custom { position: fixed; bottom: 30px; right: 30px; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast { background: var(--success); color: white; padding: 14px 24px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; }
        .toast.error { background: var(--danger); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--card-bg); border-radius: 32px; max-width: 900px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; border: 1px solid var(--border-light); overflow: hidden; }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-family: 'Fraunces', serif; font-size: 22px; background: linear-gradient(135deg, var(--blue-primary), var(--pink-primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-dim); }
        .modal-close:hover { color: var(--pink-primary); }
        .modal-body { flex: 1; overflow-y: auto; padding: 24px; }
        .modal-body .info { background: #f7fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .modal-body .info h3 { color: #2563eb; margin-bottom: 12px; font-family: 'Fraunces', serif; }
        .modal-body .row { margin: 8px 0; }
        .modal-body .label { font-weight: bold; display: inline-block; width: 140px; color: #334155; }
        .image-comparison { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        .image-comparison-item { flex: 1; min-width: 200px; text-align: center; }
        .image-comparison-item img { max-width: 100%; border-radius: 12px; border: 1px solid #e0e0e0; }
        .level-card { background: #f8fafc; border-radius: 12px; padding: 16px; margin: 16px 0; border-left: 6px solid; }
        .level-card.level-1 { border-left-color: #10b981; }
        .level-card.level-2 { border-left-color: #f59e0b; }
        .level-card.level-3 { border-left-color: #ef4444; }
        .level-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }

        .pdf-print-container { position: fixed; left: -9999px; top: 0; width: 800px; background: white; padding: 40px; font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif; color: #1a202c; line-height: 1.6; z-index: -1; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .nav-menu { display: none; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-mark"><i class="fas fa-heartbeat"></i></div>
            <div class="logo-type">EduHealth AI</div>
        </a>
        <div class="nav-menu">
            <a href="index.html" class="nav-link"><i class="fas fa-heartbeat"></i> Cẩm nang sức khỏe</a>
            <a href="checkin.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Check-in sức khỏe</a>
            <a href="map.html" class="nav-link"><i class="fas fa-hospital-user"></i> Điểm hỗ trợ y tế</a>
            <a href="forum.html" class="nav-link"><i class="fas fa-comments"></i> Diễn đàn</a>
            <a href="minigame.html" class="nav-link"><i class="fas fa-brain"></i> Minigame</a>
        </div>
        <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> <span>Chế độ tối</span></button>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt"></i> Quản lý check-in sức khỏe</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalCheckins">0</div><div>📋 Tổng check-in</div></div>
            <div class="stat-card"><div class="stat-number" id="level1Count">0</div><div>🟢 Mức 1</div></div>
            <div class="stat-card"><div class="stat-number" id="level2Count">0</div><div>🟡 Mức 2</div></div>
            <div class="stat-card"><div class="stat-number" id="level3Count">0</div><div>🔴 Mức 3</div></div>
        </div>

        <div class="checkin-list">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px;">
                <h2><i class="fas fa-list"></i> Danh sách phiếu check-in</h2>
                <div style="display: flex; gap: 12px;">
                    <select id="filterLevel" class="btn-outline" style="padding: 8px 16px;">
                        <option value="all">Tất cả mức độ</option>
                        <option value="1">🟢 Mức 1 - Theo dõi</option>
                        <option value="2">🟡 Mức 2 - Đi khám sớm</option>
                        <option value="3">🔴 Mức 3 - Đi khám ngay</option>
                    </select>
                    <button class="btn-outline" onclick="loadCheckins()"><i class="fas fa-sync-alt"></i> Tải lại</button>
                </div>
            </div>
            <div id="checkinList">
                <div style="text-align: center; padding: 60px;"><i class="fas fa-spinner fa-pulse"></i> Đang tải dữ liệu...</div>
            </div>
        </div>
    </div>

    <div class="toast-custom" id="toast" style="display: none;"><div class="toast" id="toastInner"><i class="fas fa-check-circle"></i> <span id="toastMessage"></span></div></div>
    
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Chi tiết check-in</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div id="pdfPrintContainer" class="pdf-print-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>
<script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOYFgLyliWFfNWtXHzxDQrbe_ISgmavno",
            authDomain: "eduhealth-4bcab.firebaseapp.com",
            projectId: "eduhealth-4bcab",
            storageBucket: "eduhealth-4bcab.firebasestorage.app",
            messagingSenderId: "390541255938",
            appId: "1:390541255938:web:aa7b5beca0105c28f70e1b",
            measurementId: "G-GSP46EVLYG"
        };
        firebase.initializeApp(firebaseConfig);

        // === TH�M �O?N CODE M?I ===
        // Kh?i t?o App Check v?i reCAPTCHA Enterprise
        const appCheck = firebase.appCheck();
        appCheck.activate(
          new firebase.appCheck.ReCaptchaEnterpriseProvider(
            '6LfZOsIsAAAAAK_vBWSNgolKHjLsfWxGBicixs37'
          ),
          true
        );
        // ===============================

        const auth = firebase.auth();
        const db = firebase.firestore();

        let allCheckins = [];

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastInner = document.getElementById('toastInner');
            document.getElementById('toastMessage').textContent = message;
            toastInner.classList.remove('error');
            if (isError) toastInner.classList.add('error');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

        async function loadCheckins() {
            const filterLevel = document.getElementById('filterLevel').value;
            try {
                let query = db.collection('checkin_records').orderBy('createdAt', 'desc');
                const snapshot = await query.get();
                allCheckins = [];
                snapshot.forEach(doc => { allCheckins.push({ id: doc.id, ...doc.data() }); });
                
                // Thống kê
                const total = allCheckins.length;
                const level1 = allCheckins.filter(c => c.formattedResult?.action_level === 1).length;
                const level2 = allCheckins.filter(c => c.formattedResult?.action_level === 2).length;
                const level3 = allCheckins.filter(c => c.formattedResult?.action_level === 3).length;
                document.getElementById('totalCheckins').textContent = total;
                document.getElementById('level1Count').textContent = level1;
                document.getElementById('level2Count').textContent = level2;
                document.getElementById('level3Count').textContent = level3;
                
                // Lọc
                let filtered = allCheckins;
                if (filterLevel !== 'all') {
                    filtered = allCheckins.filter(c => c.formattedResult?.action_level == filterLevel);
                }
                
                displayCheckins(filtered);
            } catch (error) {
                console.error('Lỗi:', error);
                showToast('Lỗi tải dữ liệu: ' + error.message, true);
            }
        }

        function displayCheckins(checkins) {
            const container = document.getElementById('checkinList');
            if (checkins.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text-dim);"><i class="fas fa-inbox"></i><p>Chưa có phiếu check-in nào</p></div>';
                return;
            }
            
            let html = '';
            checkins.forEach(item => {
                const level = item.formattedResult?.action_level || 1;
                const levelText = level === 1 ? '🟢 Mức 1 - Theo dõi' : (level === 2 ? '🟡 Mức 2 - Đi khám sớm' : '🔴 Mức 3 - Đi khám ngay');
                const date = item.createdAt ? item.createdAt.toDate().toLocaleString('vi-VN') : (item.timestamp ? new Date(item.timestamp).toLocaleString('vi-VN') : 'N/A');
                const hasImage = item.originalImageBase64 ? '📷 Có ảnh' : '📷 Không ảnh';
                
                html += `
                    <div class="checkin-item">
                        <div class="flex-between">
                            <div>
                                <div style="font-weight: 700; font-size: 16px; margin-bottom: 8px;">${escapeHtml(item.userName || 'Học sinh')}</div>
                                <div style="font-size: 13px; color: var(--text-dim); margin-bottom: 4px;">📅 ${date}</div>
                                <div style="font-size: 13px; color: var(--text-dim); margin-bottom: 8px;">📝 ${escapeHtml((item.symptomDescription || '').substring(0, 100))}${(item.symptomDescription || '').length > 100 ? '...' : ''}</div>
                                <div><span class="badge-level level-${level}">${levelText}</span> <span style="font-size: 12px; margin-left: 8px;">${hasImage}</span></div>
                            </div>
                            <div class="flex-buttons">
                                <button class="btn-pdf" onclick="viewDetail('${item.id}')"><i class="fas fa-eye"></i> Xem chi tiết</button>
                                <button class="btn-pdf" onclick="exportToPDF('${item.id}')"><i class="fas fa-file-pdf"></i> Tải PDF</button>
                                <button class="btn-danger" onclick="deleteCheckin('${item.id}')"><i class="fas fa-trash"></i> Xóa</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        document.getElementById('filterLevel').addEventListener('change', () => loadCheckins());

        async function viewDetail(id) {
            const checkin = allCheckins.find(c => c.id === id);
            if (!checkin) return;
            
            const modal = document.getElementById('detailModal');
            const modalBody = document.getElementById('modalBody');
            const fr = checkin.formattedResult || {};
            
            let imageHtml = '';
            if (checkin.originalImageBase64) {
                imageHtml = `
                    <div class="image-comparison">
                        <div class="image-comparison-item">
                            <h4>Ảnh gốc</h4>
                            <img src="${checkin.originalImageBase64}">
                        </div>
                        ${checkin.highlightedImageBase64 ? `
                        <div class="image-comparison-item">
                            <h4>AI khoanh vùng</h4>
                            <img src="${checkin.highlightedImageBase64}">
                        </div>` : ''}
                    </div>
                `;
            }
            
            const levelText = fr.action_level === 1 ? '🟢 Mức 1 - Theo dõi' : (fr.action_level === 2 ? '🟡 Mức 2 - Đi khám sớm' : '🔴 Mức 3 - Đi khám ngay');
            
            modalBody.innerHTML = `
                <div class="info">
                    <h3>📋 Thông tin học sinh</h3>
                    <div class="row"><span class="label">👤 Họ tên:</span> ${escapeHtml(checkin.userName || '')}</div>
                    <div class="row"><span class="label">📞 SĐT:</span> ${escapeHtml(checkin.userPhone || 'Chưa cập nhật')}</div>
                    <div class="row"><span class="label">🎂 Ngày sinh:</span> ${escapeHtml(checkin.userDob || 'Chưa cập nhật')}</div>
                    <div class="row"><span class="label">⚥ Giới tính:</span> ${escapeHtml(checkin.userGender || 'Chưa cập nhật')}</div>
                    <div class="row"><span class="label">📧 Email:</span> ${escapeHtml(checkin.userEmail || 'Chưa cập nhật')}</div>
                </div>
                <div class="info">
                    <h3>📝 Triệu chứng</h3>
                    <div class="row"><span class="label">Mô tả:</span> ${escapeHtml(checkin.symptomDescription || '')}</div>
                    <div class="row"><span class="label">Thời gian:</span> ${escapeHtml(checkin.duration || '')}</div>
                    <div class="row"><span class="label">Triệu chứng chọn:</span> ${escapeHtml((checkin.selectedSymptoms || []).join(', '))}</div>
                </div>
                ${imageHtml}
                <div class="info">
                    <h3>🔍 Kết quả nhận biết</h3>
                    <div style="background: linear-gradient(135deg, #3b82f6, #f472b6); border-radius: 16px; padding: 16px; color: white; margin-bottom: 16px;">
                        <strong>Nhận biết sơ bộ:</strong><br>${escapeHtml(fr.preliminary || '')}
                    </div>
                    <div style="margin-bottom: 16px;">
                        <strong>💡 Giải thích:</strong><br>${escapeHtml(fr.explanation || '')}
                    </div>
                    <div style="margin-bottom: 16px;">
                        <strong>⚠️ Dấu hiệu cần lưu ý:</strong>
                        <ul>${(fr.warning_signs || []).map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul>
                    </div>
                    <div class="level-card level-${fr.action_level || 1}">
                        <div class="level-title">${levelText}</div>
                        <div>${escapeHtml(fr.action_text || '')}</div>
                    </div>
                </div>
                <div style="background: #fef5e7; padding: 12px; border-radius: 8px; font-size: 12px;">
                    <strong>⚠️ Lưu ý:</strong> Kết quả từ AI, không thay thế chẩn đoán của bác sĩ.
                </div>
            `;
            document.getElementById('modalTitle').innerText = `Check-in - ${checkin.userName || 'Học sinh'}`;
            modal.classList.add('active');
        }

        async function deleteCheckin(id) {
            if (confirm('Bạn có chắc muốn xóa phiếu check-in này?')) {
                try {
                    await db.collection('checkin_records').doc(id).delete();
                    showToast('Đã xóa thành công!');
                    loadCheckins();
                } catch (error) {
                    showToast('Lỗi: ' + error.message, true);
                }
            }
        }

        async function exportToPDF(id) {
            const checkin = allCheckins.find(c => c.id === id);
            if (!checkin) { showToast('Không tìm thấy dữ liệu!', true); return; }
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Đang tạo...';
            btn.disabled = true;
            
            try {
                const pdfHtml = generatePDFHTML(checkin);
                const pdfContainer = document.getElementById('pdfPrintContainer');
                pdfContainer.innerHTML = pdfHtml;
                await new Promise(resolve => setTimeout(resolve, 500));
                const canvas = await html2canvas(pdfContainer, { scale: 2.5, backgroundColor: '#ffffff' });
                const imgData = canvas.toDataURL('image/jpeg', 0.98);
                const { jsPDF } = window.jspdf;
                const imgWidth = 190;
                const pageHeight = 277;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                let heightLeft = imgHeight;
                let position = 0;
                const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                doc.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
                while (heightLeft > 0) {
                    position = heightLeft - imgHeight;
                    doc.addPage();
                    doc.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                }
                const safeName = (checkin.userName || 'hocsinh').replace(/[^a-zA-Z0-9]/g, '_');
                doc.save(`EduHealth_Checkin_${safeName}_${Date.now()}.pdf`);
                showToast('Đã tải PDF thành công!');
            } catch (error) {
                showToast('Lỗi: ' + error.message, true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                document.getElementById('pdfPrintContainer').innerHTML = '';
            }
        }

        function generatePDFHTML(data) {
            const now = new Date();
            const formattedDate = now.toLocaleString('vi-VN');
            const fr = data.formattedResult || {};
            const levelText = fr.action_level === 1 ? '🟢 Mức 1 - Theo dõi' : (fr.action_level === 2 ? '🟡 Mức 2 - Đi khám sớm' : '🔴 Mức 3 - Đi khám ngay');
            
            let imageHtml = '';
            if (data.originalImageBase64) {
                imageHtml = `
                    <div style="margin: 20px 0; padding: 15px; border: 1px solid #e0e0e0; border-radius: 16px;">
                        <h3 style="color: #2563eb;">🖼️ Phân tích ảnh</h3>
                        <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                            <div style="flex: 1; min-width: 200px; text-align: center;">
                                <p><strong>Ảnh gốc</strong></p>
                                <img src="${data.originalImageBase64}" style="max-width: 100%; max-height: 250px; border-radius: 12px;">
                            </div>
                            ${data.highlightedImageBase64 ? `
                            <div style="flex: 1; min-width: 200px; text-align: center;">
                                <p><strong>AI khoanh vùng</strong></p>
                                <img src="${data.highlightedImageBase64}" style="max-width: 100%; max-height: 250px; border-radius: 12px;">
                            </div>` : ''}
                        </div>
                    </div>
                `;
            }
            
            return `<!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><title>Kết quả check-in</title>
            <style>
                body { font-family: 'DM Sans', Arial, sans-serif; padding: 40px; line-height: 1.6; }
                .header { text-align: center; border-bottom: 2px solid #f472b6; padding-bottom: 15px; margin-bottom: 20px; }
                .header h1 { background: linear-gradient(135deg, #3b82f6, #f472b6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Fraunces', serif; }
                .info { background: #f7fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
                .info h3 { color: #2563eb; margin-bottom: 12px; font-family: 'Fraunces', serif; }
                .row { margin: 8px 0; }
                .label { font-weight: bold; display: inline-block; width: 140px; color: #334155; }
                .level-card { background: #f8fafc; border-radius: 12px; padding: 16px; margin: 16px 0; border-left: 6px solid; }
                .level-1 { border-left-color: #10b981; }
                .level-2 { border-left-color: #f59e0b; }
                .level-3 { border-left-color: #ef4444; }
                .warning { background: #fef5e7; padding: 12px; border-radius: 8px; margin-top: 20px; font-size: 12px; }
                .footer { text-align: center; margin-top: 30px; font-size: 10px; color: #718096; border-top: 1px solid #e2e8f0; padding-top: 15px; }
                ul { margin: 8px 0 8px 20px; }
                li { margin: 4px 0; }
            </style>
            </head>
            <body>
                <div class="header">
                    <h1>🏥 EduHealth AI - Kết quả check-in</h1>
                    <p>Ngày xuất: ${formattedDate} | Mã: ${data.checkinId || data.id || ''}</p>
                </div>
                <div class="info">
                    <h3>📋 Thông tin học sinh</h3>
                    <div class="row"><span class="label">👤 Họ và tên:</span> ${escapeHtml(data.userName || '')}</div>
                    <div class="row"><span class="label">📞 Số điện thoại:</span> ${escapeHtml(data.userPhone || 'Chưa cập nhật')}</div>
                    <div class="row"><span class="label">🎂 Ngày sinh:</span> ${escapeHtml(data.userDob || 'Chưa cập nhật')}</div>
                    <div class="row"><span class="label">⚥ Giới tính:</span> ${escapeHtml(data.userGender || 'Chưa cập nhật')}</div>
                    <div class="row"><span class="label">📧 Email:</span> ${escapeHtml(data.userEmail || 'Chưa cập nhật')}</div>
                </div>
                <div class="info">
                    <h3>📝 Triệu chứng</h3>
                    <div class="row"><span class="label">Mô tả:</span> ${escapeHtml((data.symptomDescription || '').substring(0, 500))}</div>
                    <div class="row"><span class="label">Thời gian:</span> ${escapeHtml(data.duration || '')}</div>
                    <div class="row"><span class="label">Triệu chứng chọn:</span> ${escapeHtml((data.selectedSymptoms || []).join(', '))}</div>
                </div>
                ${imageHtml}
                <div class="info">
                    <h3>🔍 Kết quả nhận biết</h3>
                    <div style="background: linear-gradient(135deg, #3b82f6, #f472b6); border-radius: 16px; padding: 16px; color: white; margin-bottom: 16px;">
                        <strong>Nhận biết sơ bộ:</strong><br>${escapeHtml(fr.preliminary || '')}
                    </div>
                    <div style="margin-bottom: 16px;">
                        <strong>💡 Giải thích:</strong><br>${escapeHtml(fr.explanation || '')}
                    </div>
                    <div style="margin-bottom: 16px;">
                        <strong>⚠️ Dấu hiệu cần lưu ý:</strong>
                        <ul>${(fr.warning_signs || []).map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul>
                    </div>
                    <div class="level-card level-${fr.action_level || 1}">
                        <div class="level-title" style="font-weight:700; margin-bottom:8px;">${levelText}</div>
                        <div>${escapeHtml(fr.action_text || '')}</div>
                    </div>
                </div>
                <div class="warning"><strong>⚠️ Lưu ý:</strong> Kết quả từ AI, không thay thế chẩn đoán của bác sĩ.</div>
                <div class="footer">© 2026 EduHealth AI - Hệ thống hỗ trợ sức khỏe học đường</div>
            </body>
            </html>`;
        }

        // Khởi tạo
        loadCheckins();
        auth.onAuthStateChanged((user) => { if (!user) window.location.href = 'login.html'; });

        const themeBtn = document.getElementById('themeToggleBtn');
        const body = document.body;
        function setTheme(theme) { body.classList.toggle('dark', theme === 'dark'); localStorage.setItem('eduhealth-theme', theme); const icon = themeBtn.querySelector('i'); const span = themeBtn.querySelector('span'); if (theme === 'dark') { icon.className = 'fas fa-sun'; span.innerText = 'Chế độ sáng'; } else { icon.className = 'fas fa-moon'; span.innerText = 'Chế độ tối'; } }
        const savedTheme = localStorage.getItem('eduhealth-theme');
        setTheme(savedTheme === 'dark' ? 'dark' : 'light');
        themeBtn.onclick = () => setTheme(body.classList.contains('dark') ? 'light' : 'dark');

        window.viewDetail = viewDetail;
        window.exportToPDF = exportToPDF;
        window.deleteCheckin = deleteCheckin;
        window.loadCheckins = loadCheckins;
        window.closeModal = closeModal;
    </script>
</body>
</html>
